<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>SanGuide — Ersthelfer-Leitfaden</title>
  <meta name="description" content="Offline-Leitfaden für ausgebildete Ersthelfer: HLW-Taktung und Einsatzprotokoll." />

  <!-- PWA -->
  <meta name="theme-color" content="#f7f6f2" />
  <link rel="manifest" href="./manifest.webmanifest" />

  <!-- Icons -->
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
  <link rel="icon" href="./icons/favicon-32.png" sizes="32x32" type="image/png" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="SanGuide" />

  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <img class="brand-mark" src="./icons/icon.svg" alt="" width="40" height="40" />
      <span class="brand-text">
        <span class="brand-name">SanGuide</span>
        <span class="brand-tag">Ersthelfer-Leitfaden</span>
      </span>
    </header>

    <!-- Persistent audio/voice hint (shown during CPR, R1) -->
    <p class="warning" id="warning" role="status" hidden></p>

    <!-- Guidance render target — screens are built by js/app.js -->
    <div id="screen" class="screen-host"></div>

    <footer class="footer">
      <span class="status" id="offline-status" data-ready="false">
        <span class="status-dot" aria-hidden="true"></span>
        <span id="offline-status-text">Offline-Modus wird vorbereitet…</span>
      </span>
      <p class="disclaimer">
        Informationshilfe für ausgebildete Ersthelfer. Ersetzt weder die
        Ausbildung noch den Notruf.
      </p>
    </footer>
  </main>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
